[package]
name = "loro-go"
version = "1.10.3"
edition = "2021"

[lib]
name = "loro"
crate-type = ["staticlib"]

[[bin]]
name = "uniffi-bindgen-go"
path = "src/uniffi-bindgen-go.rs"

[dependencies]
loro-ffi = { git = "https://github.com/orjanbruland/loro-ffi.git", rev = "e43310a4afeffe467d0566f2ad1d8c5850828e43" }
uniffi = { version = "0.28.3" }
uniffi-bindgen-go = { git = "https://github.com/NordSecurity/uniffi-bindgen-go.git", tag = "v0.4.0+v0.28.3" }

[build-dependencies]
uniffi = { version = "0.28.3", features = ["build"] }

[features]
cli = ["uniffi/cli"]

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
