name: Build Libraries

on:
  push:
    branches: [main]
    paths:
      - "loro-go/**"
      - "loro-ffi/**"
      - "libs.go"
      - ".github/workflows/build-libs.yml"
  pull_request:
    paths:
      - "loro-go/**"
      - "loro-ffi/**"
      - "libs.go"
      - ".github/workflows/build-libs.yml"

jobs:
  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: loro-go
          key: ${{ matrix.target }}

      - name: Build static library
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build \
            --manifest-path loro-go/Cargo.toml \
            --target ${{ matrix.target }} \
            --lib \
            --locked \
            --release

      - uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: loro-go/target/${{ matrix.target }}/release/libloro.a
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: loro-go
          key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build static library
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cross build \
            --manifest-path loro-go/Cargo.toml \
            --target ${{ matrix.target }} \
            --lib \
            --locked \
            --release

      - uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: loro-go/target/${{ matrix.target }}/release/libloro.a
          if-no-files-found: error

  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: loro-go
          key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build static library
        env:
          RUSTFLAGS: "-C target-feature=+crt-static --print native-static-libs"
        run: |
          cross build \
            --manifest-path loro-go/Cargo.toml \
            --target ${{ matrix.target }} \
            --lib \
            --locked \
            --release 2>&1 | tee build.log
          echo "---- native-static-libs needed by libs.go cgo LDFLAGS ----"
          grep "native-static-libs:" build.log || true

      - uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: loro-go/target/${{ matrix.target }}/release/libloro.a
          if-no-files-found: error

  generate-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: loro-go
          key: bindings

      - name: Generate Go bindings
        run: |
          cd loro-go
          cargo run \
            --no-default-features \
            --features=cli \
            --bin uniffi-bindgen-go \
            ../loro-ffi/src/loro.udl \
            --out-dir target/go
          test -f target/go/loro/loro.go
          test -f target/go/loro/loro.h

      - uses: actions/upload-artifact@v4
        with:
          name: go-bindings
          path: loro-go/target/go/loro/
          if-no-files-found: error

  smoke-test:
    needs: [build-darwin, build-linux, build-windows, generate-bindings]
    strategy:
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - runner: windows-latest
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/download-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: artifacts/lib

      - uses: actions/download-artifact@v4
        with:
          name: go-bindings
          path: artifacts/go-bindings

      - name: Place artifacts
        run: |
          mkdir -p libs/${{ matrix.target }}
          cp artifacts/lib/libloro.a libs/${{ matrix.target }}/libloro.a
          cp artifacts/go-bindings/*.go .
          cp artifacts/go-bindings/*.h .

      - name: Run smoke test
        run: go run ./examples/simple

  collect:
    if: github.event_name == 'push'
    needs: [build-darwin, build-linux, build-windows, generate-bindings, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy artifacts into place
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-musl aarch64-unknown-linux-musl x86_64-pc-windows-gnu; do
            mkdir -p libs/${target}
            cp artifacts/lib-${target}/libloro.a libs/${target}/libloro.a
          done

          # Copy generated Go bindings to repo root
          cp artifacts/go-bindings/*.go .
          cp artifacts/go-bindings/*.h .

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README version
        run: |
          VERSION=$(grep '^version' loro-go/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          sed -i "s/Current Loro version: .*/Current Loro version: ${VERSION}/" README.md

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          VERSION=$(grep '^version' loro-go/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add libs/ *.go *.h README.md
          git commit -m "feat: Update built libraries and bindings for Loro v${VERSION}"
          git push
